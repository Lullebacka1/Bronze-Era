l_english:
  trojan_war_phase_1: "The Trojan War - Phase 1"
  trojan_war_phase_1_desc: "The Trojan War has begun. The city of Troy is under siege by the Greek forces, and the fate of the city hangs in the balance. Will you be able to defend Troy and emerge victorious, or will you succumb to the might of the Greek army? The first phase of the war has just begun, and there are many challenges ahead. Prepare for battle and fight for your survival in this epic conflict."
  trojan_war_panel_header: "THE TROJAN WAR"
  trojan_war_panel_phase: "Current Phase:"
  trojan_war_panel_phase_value: "Phase 1: The Beachhead"
  trojan_war_panel_escalation: "Escalation Level:"
  trojan_war_panel_escalation_value: "High"
  trojan_war_actions_header: "War Actions"
  trojan_war_raid_on_anatolia: "Raid Anatolia"
  trojan_war_defend_coastline: "Defend the Coastline"
  trojan_war_raid_toggled: "The Trojan War - Phase 1 Raid Toggled"
  raid_on_anatolia_effect_desc: "Spend 75 treasury and 250 manpower to launch naval raiding parties across the Aegean Sea. Success grants a temporary raiding bonus; failure weakens the expedition."
  defend_coastline_effect_desc: "Spend 25 treasury and 150 manpower to mobilize coastal watches for six months, reducing the success chance of enemy raids."
  
  # Event 1: Successful Raid Outcomes
  trojan_war_raid_on_anatolia_success: "Successful Raid on Anatolia"
  trojan_war_raid_on_anatolia_success.t: "Successful Raid on Anatolia"
  trojan_war_raid_on_anatolia_success.d: "Thy raiding forces sent to Anatolia have returned victorious, bringing back spoils and weakening the enemy's supply lines. The morale of our troops has been boosted, and the Greek forces are now on the defensive."
  trojan_war_raid_on_anatolia_success.a: "Celebrate the Victory"
  trojan_war_raid_on_anatolia_success.b: "Secure the Spoils"

  # Event 2: Failed Raid Outcomes
  trojan_war_raid_on_anatolia_failed: "Failed Raid on Anatolia"
  trojan_war_raid_on_anatolia_failed.t: "Failed Raid on Anatolia"
  trojan_war_raid_on_anatolia_failed.d: "Thy raiding forces sent to Anatolia have returned empty-handed, suffering heavy losses and failing to disrupt the enemy's supply lines. The morale of our troops has been damaged, and the Greek forces are now emboldened."
  trojan_war_raid_on_anatolia_failed.a: "Leave the Survivors to Languish"
  trojan_war_raid_on_anatolia_failed.b: "Recruit a force to rescue the Survivors"

  # Event 3: Coastline Defended Outcomes
  anatolia_coastline_is_defend: "Defended Coastline"
  anatolia_coastline_is_defend.t: "Defense against the Greeks"
  anatolia_coastline_is_defend.d: "Our defenses have been heightened by the coastal watch; the Greek forces will have a harder time launching successful raids against our coastal provinces."
  anatolia_coastline_is_defend.a: "Continue to Defend the Coastline"