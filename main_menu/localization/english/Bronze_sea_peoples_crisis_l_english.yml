 sea_peoples_phase_1_climate_pressure: "Climate Pressure"
 sea_peoples_phase_1_climate_pressure_desc: "Failed harvests and shifting weather patterns strain granaries, palace storage, and rural loyalty."
 sea_peoples_phase_2_migration_pressure: "Migration Pressure"
 sea_peoples_phase_2_migration_pressure_desc: "Displaced groups move along coasts, islands, roads, and broken trade lanes."
 sea_peoples_phase_3_trade_crash: "Mediterranean Trade Crash"
 sea_peoples_phase_3_trade_crash_desc: "Copper, tin, grain, timber, luxury goods, and palace exchange networks are breaking apart."
 sea_peoples_phase_4_settlement_fragmentation: "Settlement Fragmentation"
 sea_peoples_phase_4_settlement_fragmentation_desc: "Raiders, refugees, mercenaries, and displaced households begin settling in abandoned or weakened lands."
 sea_peoples_phase_5_iron_age_transition: "Iron Age Transition"
 sea_peoples_phase_5_iron_age_transition_desc: "The old palace world has broken. New maritime, tribal, and regional powers start to replace it."
 sea_peoples_raided_coast_modifier: "Burned Coast"
 sea_peoples_raided_coast_modifier_desc: "Ports, ship sheds, storehouses, and coastal villages have been raided by maritime bands."
 sea_peoples_refugee_pressure_modifier: "Refugee Pressure"
 sea_peoples_refugee_pressure_modifier_desc: "Hungry refugees and displaced families are entering the country, increasing strain on food and order."
 sea_peoples_palace_economy_collapse_modifier: "Palace Economy Collapse"
 sea_peoples_palace_economy_collapse_modifier_desc: "The redistributive palace economy can no longer reliably move grain, bronze, textiles, and labor."
 sea_peoples_internal_breakdown_modifier: "Internal Breakdown"
 sea_peoples_internal_breakdown_modifier_desc: "Rivals, pretenders, hungry villages, and armed factions are pulling the state apart."
 sea_peoples_settlement_pressure_modifier: "Sea Peoples Settlement"
 sea_peoples_settlement_pressure_modifier_desc: "Maritime migrants and war bands are pressing to settle in weakened coastal districts."
 sea_peoples_assimilation_pressure_modifier: "Maritime Assimilation"
 sea_peoples_assimilation_pressure_modifier_desc: "Foreign settlers are merging into local society through service, marriage, trade, and sanctuary ties."
 sea_peoples_port_defense_preparations_modifier: "Port Defenses"
 sea_peoples_port_defense_preparations_modifier_desc: "Rulers have diverted resources into ships, coastal watch posts, harbor guards, and emergency granaries."
 sea_peoples_egypt_mobilization_modifier: "Delta Mobilization"
 sea_peoples_egypt_mobilization_modifier_desc: "Egypt mobilizes ships, archers, garrisons, and grain to defend the Delta and Nile approaches."
 sea_peoples_phoenician_opening_modifier: "Phoenician Opening"
 sea_peoples_phoenician_opening_modifier_desc: "The collapse of old overlords gives Levantine port cities new room to trade, build fleets, and absorb migrants."
 sea_peoples_crisis.1.title: "The Sea Peoples Crisis"
 sea_peoples_crisis.1.desc: "Rumors move faster than ships: harvests have failed in distant lands, palace warehouses stand empty, and armed families are taking to the sea. Some come as raiders, some as refugees, some as mercenaries with no lord left to pay them. The eastern Mediterranean order is beginning to crack."
 sea_peoples_crisis.1.a: "The palace records will name this calamity."
 sea_peoples_crisis.1.b: "Warn the harbors and count the grain."
 sea_peoples_crisis.5.title: "The Crisis Deepens"
 sea_peoples_crisis.5.desc: "What began as bad harvests and scattered raids has become a wider movement of people, ships, and fear. Envoys speak of burned towns, lost caravans, and kings who no longer command their own warriors."
 sea_peoples_crisis.5.a: "The tide rises."
 sea_peoples_crisis.5.b: "Hold the line for another season."
 sea_peoples_crisis.10.title: "Empty Granaries"
 sea_peoples_crisis.10.desc: "The palace granaries are forced open before the next harvest. Rations shrink, villages hide their grain, and priests read unease in every omen."
 sea_peoples_crisis.10.a: "The hunger spreads."
 sea_peoples_crisis.10.b: "Spend prestige to maintain the ration lines."
 sea_peoples_crisis.20.title: "Raiders from the Sea"
 sea_peoples_crisis.20.desc: "Long ships have been sighted beyond the coast. By dawn, warehouses burn and harbor workers flee inland. The attackers vanish before the palace can gather its chariots."
 sea_peoples_crisis.20.a: "The coast burns."
 sea_peoples_crisis.20.b: "Raise harbor guards and patrol ships."
 sea_peoples_crisis.30.title: "Refugee Ships"
 sea_peoples_crisis.30.desc: "Families crowd onto ships and carts, carrying gods, bronze tools, children, and stories of kingdoms that no longer answer messengers. They ask for grain, land, and protection."
 sea_peoples_crisis.30.a: "Let them through the gates."
 sea_peoples_crisis.30.b: "Settle them under palace supervision."
 sea_peoples_crisis.40.title: "The Bronze Network Breaks"
 sea_peoples_crisis.40.desc: "Tin caravans are late, copper shipments are lost, and luxury gifts no longer arrive at court. Scribes can still tally obligations, but the routes that made those obligations real are failing."
 sea_peoples_crisis.40.a: "The palace economy falters."
 sea_peoples_crisis.40.b: "Seize what remains of the trade stores."
 sea_peoples_crisis.50.title: "Palace Authority Cracks"
 sea_peoples_crisis.50.desc: "The wanax, king, or chief may command from the throne room, but the countryside listens less each month. Local strongmen arm their followers, labor gangs vanish, and old rivalries become dangerous."
 sea_peoples_crisis.50.a: "The center cannot hold."
 sea_peoples_crisis.50.b: "Send oaths, threats, and gifts."
 sea_peoples_crisis.60.title: "Newcomers Demand Land"
 sea_peoples_crisis.60.desc: "Sea Peoples bands, mercenary households, and displaced clans have stopped moving. They ask for fields and ports, and they keep their weapons close while they wait for an answer."
 sea_peoples_crisis.60.a: "They settle where authority is weak."
 sea_peoples_crisis.60.b: "Push them into watched districts."
 sea_peoples_crisis.70.title: "Maritime Peoples Take Root"
 sea_peoples_crisis.70.desc: "Foreign names enter local rolls. Their gods receive offerings beside old sanctuaries, their ships carry local goods, and their warriors take local wives. What arrived as danger is becoming part of the coast."
 sea_peoples_crisis.70.a: "Let the sea people become our people."
 sea_peoples_crisis.70.b: "Bind them through service and trade."
 sea_peoples_crisis.80.title: "The Port Cities Breathe"
 sea_peoples_crisis.80.desc: "As old empires fail, Levantine harbors adapt. Phoenician merchants take over routes abandoned by palaces, absorb displaced sailors, and turn crisis into maritime independence."
 sea_peoples_crisis.80.a: "A new sea trade is born from ruin."
 sea_peoples_crisis.90.title: "Ships at the Delta"
 sea_peoples_crisis.90.desc: "Reports from the coast speak of warships, ox carts, families, and armed bands moving toward the Nile mouths. Egypt can survive, but only by spending grain, bronze, and royal prestige on defense."
 sea_peoples_crisis.90.a: "Mobilize the Delta."
 sea_peoples_crisis.90.b: "Meet them with ships, archers, and grain."
 sea_peoples_crisis.100.title: "The Palaces Tremble"
 sea_peoples_crisis.100.desc: "Across the Achaean world, storehouses burn and palace records end in smoke. Rival wanaktes blame one another, farmers retreat to safer hills, and the old heroic order begins to fracture."
 sea_peoples_crisis.100.a: "The League loses its grip."
 sea_peoples_crisis.100.b: "Save the records, abandon the stores."
 sea_peoples_crisis.110.title: "After the Burning"
 sea_peoples_crisis.110.desc: "The worst fires have passed, though nothing returns as it was. Some refugees have become neighbors, some palaces never reopened, and new coastal powers begin writing the next age."
 sea_peoples_crisis.110.a: "The world has changed."
