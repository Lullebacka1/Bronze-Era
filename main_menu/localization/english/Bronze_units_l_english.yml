l_english:

  a_slingers: "Slingers"
  a_slingers_desc: "Drawn from shepherds, hunters, and common folk, slingers hurl stones with surprising force and accuracy. Cheap to equip and easy to recruit, they provide valuable ranged support on the battlefield."

  a_simple_chariots: "Simple Chariots"
  a_simple_chariots_desc: "Fast and agile vehicles crewed by a driver and warrior, simple chariots excel at scouting, skirmishing, and harassing slower enemies across open ground."

  a_heavy_chariots: "Heavy Chariots"
  a_heavy_chariots_desc: "Built with sturdier frames and larger crews, heavy chariots deliver shock and prestige on the battlefield. Though costly and terrain-dependent, they can dominate less organized foes in open terrain."

  a_light_chariots: "Light Chariots"
  a_light_chariots_desc: "The backbone of mature chariot warfare, light chariots combine speed, maneuverability, and missile power to dominate open battlefields. Crewed by skilled warriors and drawn by trained horse teams, they excel at skirmishing, pursuit, and disrupting enemy formations."

  a_spearmen: "Spearmen"
  a_spearmen_desc: "Armed with long spears and simple shields, spearmen form disciplined defensive formations capable of holding the line against infantry, chariots, and cavalry. They are the backbone of many Bronze Age armies."

  a_axemen: "Axemen"
  a_axemen_desc: "Wielding heavy axes designed for brutal close combat, axemen excel at breaking enemy formations and overwhelming opponents through aggressive assaults. Their ferocity makes them valuable shock troops."

  a_swordsmen: "Swordsmen"
  a_swordsmen_desc: "Equipped with versatile cut-and-thrust swords, these warriors are trained for mobile close-quarters combat. They exploit gaps in enemy lines and adapt readily to the changing conditions of battle."

  a_neolithic_bowmen: "Bowmen"
  a_neolithic_bowmen_desc: "Armed with simple self bows, these archers provide ranged support and can harass enemies before close combat begins."

  a_composite_bowmen: "Composite Bowmen"
  a_composite_bowmen_desc: "Equipped with advanced composite bows, these skilled archers deliver accurate fire at longer ranges and with greater force than ordinary bowmen."

  a_mustered_infantry: "Mustered Infantry"
  a_mustered_infantry_desc: "Drawn from households obligated to provide military service, these warriors bring their own weapons and equipment when called upon by local chiefs and rulers. They lack the training of elite retainers but provide the manpower needed for larger campaigns."