l_english:

  merchant_house: "Merchant House"
  merchant_house_desc: "Merchant houses serve as centers of trade, storage, and accounting for emerging commercial families operating beyond purely household exchange. From these compounds, merchants organize caravans, manage goods, negotiate contracts, and connect distant settlements through growing networks of commerce."

  bronze_age_trade_office: "Trade Post"
  bronze_age_trade_office_desc: "A trading post gathers merchants, caravans, and local producers at a recognized exchange point where goods, information, and travelers pass between regions. Though modest in scale, such sites help tie distant communities into wider economic networks."