l_english:
  neolithic_leather_maker: "Local Tanner"
  neolithic_leather_maker_desc: "Leatherworking is dispersed among households rather than organized in dedicated workshops, with most families tanning small amounts of hide for their own needs or local exchange. Production remains informal, seasonal, and rooted in domestic labor, lacking specialized craftsmen or centralized oversight."

  weaponry_maker: "Local Weapon Maker"
  weaponry_maker_desc: "In the early Bronze Age, weapon production is a household craft. Villagers cast simple weapons for their own use, without the specialization or scale of organized labor."

  pottery_maker: "Local Pottery Maker"
  pottery_maker_desc: "In the early Bronze Age, pottery production is a household craft. Villagers create simple pottery for their own use, without the specialization or scale of organized labor."

  tools_maker: "Local Tools Maker"
  tools_maker_desc: "In the early Bronze Age, tool production is a household craft. Villagers cast simple tools for their own use, without the specialization or scale of organized labor."

  neolithic_beer_maker: "Village Brewery"
  neolithic_beer_maker_desc: "Brewing is carried out on a household and village scale using locally available grains, fruits, and other fermentable crops. These small producers supply communities with beverages used in daily life, feasting, and ritual."

  neolithic_dyes_maker: "Village Dyers"
  neolithic_dyes_maker_desc: "Households and small workshops produce dyes from local plants, minerals, and other natural materials. Though limited in scale, these craftsmen supply pigments for textiles, decoration, and ritual use."


  # #############################
  # PRODUCTION METHODS
  # #############################

  tools_maker_iron_recipe: "Local Iron Tools Production"
  tools_maker_iron_recipe_desc: "The local tools maker produces iron tools, but the quality is inconsistent and the output is limited by the scarcity of iron ore and the lack of advanced smelting oven."

  tools_maker_bronze_recipe: "Local Bronze Tools Production"
  tools_maker_bronze_recipe_desc: "The local tools maker produces bronze tools, but the output is limited by the supply of imported tin and the lack of advanced smelting ovens."

  tools_maker_stone_recipe: "Local Stone Tools Production"
  tools_maker_stone_recipe_desc: "The local tools maker produces stone tools."

  tools_maker_copper_recipe: "Local Copper Tools Production" 
  tools_maker_copper_recipe_desc: "The local tools maker produces copper tools."

  pottery_maker_maintenance: "Local Pottery Production"
  pottery_maker_maintenance_desc: "The local pottery maker produces simple clay vessels for household use."

  weaponry_maker_iron_recipe: "Local Iron Weapon Production"
  weaponry_maker_iron_recipe_desc: "The local weapon maker produces iron weapons, but the quality is inconsistent and the output is limited by the scarcity of iron ore and the lack of advanced smelting oven."

  weaponry_maker_bronze_recipe: "Local Bronze Weapon Production"
  weaponry_maker_bronze_recipe_desc: "The local weapon maker produces bronze weapons, but the output is limited by the supply of imported tin and the lack of advanced smelting ovens."

  weaponry_maker_stone_recipe: "Local Stone Weapon Production"
  weaponry_maker_stone_recipe_desc: "The local weapon maker produces stone weapons."

  weaponry_maker_copper_recipe: "Local Copper Weapon Production"
  weaponry_maker_copper_recipe_desc: "The local weapon maker produces copper weapons."

  neolithic_leather_maker_maintenance_livestock: "Livestock Hides"
  neolithic_leather_maker_maintenance_livestock_desc: "Leather is produced from domesticated herd animals slaughtered for meat, milk, or labor. Production is more reliable and integrated into daily rural life, supporting steady household crafting and local trade."

  neolithic_leather_maker_maintenance_wild_game: "Wild game Hides"
  neolithic_leather_maker_maintenance_wild_game_desc: "Leather is sourced from hunted animals, tying production to seasonal hunts and woodland access. Supplies are irregular but provide durable furs and hides valued for prestige clothing, trophies, and hardy equipment."

  wheat_brewery_maintenance: "Wheat Brewing"
  wheat_brewery_maintenance_desc: "Brewers ferment wheat into nourishing alcoholic beverages consumed at feasts, rituals, and communal gatherings."

  millet_brewery_maintenance: "Millet Brewing"
  millet_brewery_maintenance_desc: "Millet serves as the foundation for local brewing traditions, producing reliable beverages from a hardy and widely cultivated crop."

  fruit_brewery_maintenance: "Fruit Fermentation"
  fruit_brewery_maintenance_desc: "Fruit is fermented into alcoholic drinks valued for their flavor, variety, and use in seasonal celebrations."

  maize_brewery_maintenance: "Maize Brewing"
  maize_brewery_maintenance_desc: "Ground maize is fermented into traditional beverages that play an important role in communal life, hospitality, and ritual observance."

  honey_brewery_maintenance: "Honey Brewing"
  honey_brewery_maintenance_desc: "Honey and grain are combined to produce prized fermented drinks often associated with feasting, ceremony, and social prestige."

  rice_brewery_maintenance: "Rice Brewing"
  rice_brewery_maintenance_desc: "Rice is fermented into alcoholic beverages that serve both everyday consumption and ceremonial purposes in rice-growing communities."

  dyes_maker_maintenance: "Natural Dyes"
  dyes_maker_maintenance_desc: "Dyes are produced from locally available plants, bark, roots, and other organic materials gathered from the surrounding landscape."

  alum_dyes_maker_maintenance: "Alum Mordants"
  alum_dyes_maker_maintenance_desc: "The use of alum improves the fixation and durability of dyes, producing brighter colors and reducing fading in dyed textiles."