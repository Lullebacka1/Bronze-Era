l_english:
 bronze_era_chronology_note: "Bronze Era Chronology"
 bronze_era_chronology_note_desc: "For technical stability, the engine uses positive internal years. Internal year 1 represents 1209 BC; internal year 15 represents 1195 BC; internal year 1329 represents 120 AD. During the BC portion of the campaign, the historical year is approximately 1210 minus the internal engine year."