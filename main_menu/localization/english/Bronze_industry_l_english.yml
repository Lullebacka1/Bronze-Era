l_english:
  bronze_age_bronze_foundry: "Bronze Alloying Workshop"
  bronze_age_bronze_foundry_desc: "A workshop of furnaces, crucibles and molds where copper is alloyed with precious tin to create bronze for palace economies, artisans and armorers."

  bronze_age_bronze_forge: "Bronze Forge"
  bronze_age_bronze_forge_desc: "In early Bronze Age societies, metalworking was still a household craft, with villagers casting tools and weapons for their own use rather than relying on dedicated smiths."

  bronze_age_bronze: "Bronze"
  bronze_age_bronze_desc: "Bronze is an alloy of copper and tin, prized for tools, weapons, fittings and prestige objects. Its production depends on fragile long-distance tin routes."

  tin: "Tin"
  tin_desc: "Tin is a rare strategic metal required for true bronze. Its scarcity made distant mines and maritime trade routes vital to Late Bronze Age economies."

  bronze_age_full_bronze_supply: "Full Bronze Supply"
  bronze_age_full_bronze_supply_desc: "The foundry has reliable access to both copper and tin, allowing its smiths to cast durable bronze at full efficiency."

  bronze_age_bronze_shortage: "Tin Shortage Smelting"
  bronze_age_bronze_shortage_desc: "Tin routes are unreliable. The foundry stretches copper stocks, recycles scrap and produces only a small quantity of usable bronze."

  tools_guild: "Royal Tools Workshop"
  tools_guild_desc: "The great task of building a prosperous domain requires the finest tools and equipment. The royal tools workshop is a dedicated facility where skilled craftsmen and artisans create high-quality tools and implements for distribution according to the orders from the Palace."

  weapon_guild: "Royal Weapon Workshop"
  weapon_guild_desc: "The great task of building a prosperous domain requires the finest weapons and equipment. The royal weapon workshop is a dedicated facility where skilled craftsmen and artisans create high-quality weapons and implements for distribution according to the orders from the Palace."

  tablets_guild: "Royal Tablets Workshop"
  tablets_guild_desc: "The invention of writing tablets allows for the recording of information, communication, and the development of complex administrative systems in Bronze Age societies."

  royal_scribe_guild: "Royal Scribe School"
  royal_scribe_guild_desc: "The royal scribe school is a prestigious institution where the most talented individuals are trained in the art of writing and record-keeping. The school produces highly skilled scribes who serve the administrative needs of the palace and contribute to the development of complex bureaucratic systems in Bronze Age societies."

  fine_cloth_palace: "Royal Weavers"
  fine_cloth_palace_desc: "Attached to the palace economy, royal weaving workshops produce fine textiles for courtly dress, ceremonial use, diplomatic gifts, and elite consumption. Their craftsmen transform valuable fibers and dyes into goods that display wealth, status, and authority."

  beer_palace: "Royal Brewers"
  beer_palace_desc: "Operating under palatial supervision, royal breweries produce large quantities of fermented beverages for feasts, religious ceremonies, labor rations, diplomatic gifts, and elite consumption. Their output supports both the daily functioning and prestige of the palace economy."

  pottery_palace: "Royal Potters"
  pottery_palace_desc: "Palatial pottery workshops produce storage jars, tableware, transport containers, and ceremonial vessels in large quantities. Their output supports administration, trade, religious institutions, and the daily needs of the palace economy."

  naval_supplies_palace: "Royal Shipwrights"
  naval_supplies_palace_desc: "Working under palatial supervision, shipwrights and craftsmen produce rope, sails, rigging, pitch, and other essential maritime supplies. Their workshops sustain trade fleets, fishing vessels, and warships that extend the reach of the realm across rivers and seas."

  winery_palace: "Royal Wineries"
  winery_palace_desc: "Palatial wineries produce fermented beverages for feasting, diplomacy, religious ceremonies, and elite consumption. Their products serve both as symbols of prestige and as valuable goods within the redistributive economy."

  jewelry_palace: "Royal Jewelers"
  jewelry_palace_desc: "Working under palatial supervision, skilled artisans craft jewelry, ornaments, ceremonial regalia, and prestige goods from precious metals and gemstones. Their creations serve as symbols of status, diplomatic gifts, religious offerings, and displays of royal wealth."


  # ########################
  # PRODUCTION METHODS
  # ########################

  tools_guild_stone_recipe: "Stone Tool Workshops"
  tools_guild_stone_recipe_desc: "Palatial workshops organize craftsmen producing simple stone tools for agriculture, construction, and household labor using widely available local materials."

  tools_guild_copper_recipe: "Copper Smithing Workshops"
  tools_guild_copper_recipe_desc: "Royal workshops employ specialized smiths to cast and shape copper tools, improving durability and supporting more advanced craft production."

  tools_guild_bronze_recipe: "Bronze Foundries"
  tools_guild_bronze_recipe_desc: "Centralized palace foundries produce high-quality bronze tools through controlled alloying and specialized metallurgy, greatly increasing efficiency and reinforcing elite economic power."

  bronze_age_small_scale_bronze_prod: "Local Bronze Smelting"
  bronze_age_small_scale_bronze_prod_desc: "The local forge produces a small quantity of bronze."

  scribe_tablets_maintenance: "Tablet Writing Materials"
  scribe_tablets_maintenance_desc: "The royal scribes use tablets for their work."

  scribe_paper_maintenance: "Paper Writing Materials"
  scribe_paper_maintenance_desc: "The royal scribes use paper for their work."

  clay_tablets_maintenance: "Clay Tablets Production"
  clay_tablets_maintenance_desc: "The local tablets workshop produces simple clay tablets for record-keeping and communication."

  copper_tablets_maintenance: "Copper Tablets Production"
  copper_tablets_maintenance_desc: "The local tablets workshop produces copper tablets for record-keeping and communication."

  weapon_guild_stone_recipe: "Stone Weapon Workshops"
  weapon_guild_stone_recipe_desc: "Royal craftsmen produce stone-headed weapons, clubs, spears, and simple arms from carved stone, wood, and basic toolmaking techniques."

  weapon_guild_bronze_recipe: "Bronze Weapon Foundries"
  weapon_guild_bronze_recipe_desc: "Palatial foundries equip warriors with durable bronze weapons forged through advanced metallurgy, organized labor, and controlled access to strategic resources."

  weapon_guild_obsidian_recipe: "Obsidian Weapon Workshops"
  weapon_guild_obsidian_recipe_desc: "Specialized craftsmen shape volcanic glass into razor-sharp blades, spearheads, and ceremonial weapons prized for their cutting power and prestige."

  weapon_guild_copper_recipe: "Copper Weapon Workshops"
  weapon_guild_copper_recipe_desc: "Royal weapon workshops cast and hammer copper into axes, daggers, spearheads, and other arms that surpass stone weapons in versatility and status."

  weapon_guild_iron_recipe: "Iron Arms Forging"
  weapon_guild_iron_recipe_desc: "With the advent of iron smelting, royal workshops begin forging iron weapons. While early iron is often brittle and less durable than bronze, it represents a significant technological shift with the potential for mass production and widespread access to weaponry."

  fine_cloth_guild_maintenance: "Fine Cloth Weaving"
  fine_cloth_guild_maintenance_desc: "Skilled weavers refine ordinary cloth into higher-quality textiles suitable for elite households and administrative institutions."

  wool_weavers_maintenance: "Wool Weaving"
  wool_weavers_maintenance_desc: "Experienced craftsmen produce fine woolen textiles valued for their durability, comfort, and versatility."

  silk_weavers_maintenance: "Silk Weaving"
  silk_weavers_maintenance_desc: "Rare silk fibers are transformed into luxurious textiles reserved for the wealthiest patrons and the most prestigious ceremonial uses."

  base_fine_cloth_guild_maintenance: "Dyed Textiles"
  base_fine_cloth_guild_maintenance_desc: "The application of dyes increases the value and desirability of fine textiles while expanding the range of available colors."

  alum_fine_cloth_guild_maintenance: "Mordant Dyeing"
  alum_fine_cloth_guild_maintenance_desc: "Alum improves the brightness and durability of dyed fabrics, allowing weavers to produce more vibrant and lasting textiles."

  fur_trim_guild_maintenance: "Fur Trimmings"
  fur_trim_guild_maintenance_desc: "Fine garments are enhanced with carefully selected furs, increasing their prestige and appeal among elite consumers."

  wheat_palace_brewery_maintenance: "Wheat Brewing"
  wheat_palace_brewery_maintenance_desc: "Palace brewers produce wheat-based beer for distribution to workers, retainers, officials, and ceremonial gatherings."

  millet_palace_brewery_maintenance: "Millet Brewing"
  millet_palace_brewery_maintenance_desc: "Millet provides a dependable foundation for large-scale brewing operations serving the needs of the palace and its dependents."

  fruit_palace_brewery_maintenance: "Fruit Fermentation"
  fruit_palace_brewery_maintenance_desc: "Fruit-based beverages are produced for feasting, ritual observances, and the tables of elite households."

  maize_palace_brewery_maintenance: "Maize Brewing"
  maize_palace_brewery_maintenance_desc: "Specialized brewers ferment maize into beverages consumed during ceremonies, communal gatherings, and official functions."

  honey_palace_brewery_maintenance: "Honey Brewing"
  honey_palace_brewery_maintenance_desc: "Honey and grain are used to create prized fermented drinks associated with hospitality, prestige, and ritual celebration."

  rice_palace_brewery_maintenance: "Rice Brewing"
  rice_palace_brewery_maintenance_desc: "Rice-based alcoholic beverages are produced in organized workshops to supply both everyday consumption and ceremonial needs."

  palace_pottery_maintenance: "Ceramic Production"
  palace_pottery_maintenance_desc: "Skilled potters shape and fire clay into vessels used for storage, transport, cooking, trade, and administrative purposes throughout the realm."

  naval_supplies_palace_maintenance: "Naval Equipment Production"
  naval_supplies_palace_maintenance_desc: "Specialized craftsmen manufacture the ropes, sails, caulking materials, and fittings required to construct, maintain, and operate seagoing vessels."

  palace_fruit_winery_maintenance: "Fruit Winemaking"
  palace_fruit_winery_maintenance_desc: "Skilled vintners ferment fruit into prized beverages reserved for feasts, ceremonies, and the households of the wealthy."

  palace_rice_winery_maintenance: "Rice Winemaking"
  palace_rice_winery_maintenance_desc: "Rice is carefully fermented into refined alcoholic beverages consumed at courtly gatherings and important ritual occasions."

  palace_honey_winery_maintenance: "Honey Winemaking"
  palace_honey_winery_maintenance_desc: "Honey is transformed into luxurious fermented drinks associated with hospitality, religious observance, and elite status."