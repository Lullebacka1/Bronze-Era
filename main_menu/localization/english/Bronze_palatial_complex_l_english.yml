l_english:
  bronze_age_palatial_complex: "Palatial Complex"
  bronze_age_palatial_complex_desc: "The administrative heart of a Bronze Age state: fortified halls, archives, granaries, workshops and royal courts where grain, labor, taxes and prestige goods are recorded and redistributed under palace authority."

  bronze_age_palatial_complex_construction: "Palatial Complex Construction"

  # PRODUCTION METHODS

  bronze_age_palace_house: "Palace House"
  bronze_age_palace_house_desc: "A regional Mycenaean palace household: scribes, retainers, storerooms and aristocratic dependents who preserve local authority under the High Wanax."
  bronze_age_palace_house_setup_only_tt: "Palace houses are placed by scenario setup and represent extraterritorial Mycenaean political entities."

  bronze_age_palace_administration: "Administrative Palace"
  bronze_age_palace_administration_desc: "Scribes, seal-bearers and palace officials record labor obligations, tribute, land grants and royal decrees on clay tablets."

  bronze_age_palace_trade: "Trade Palace"
  bronze_age_palace_trade_desc: "Palace officials supervise merchants, weigh metals, regulate storerooms and connect the court to long-distance exchange networks."

  bronze_age_palace_storage: "Storage Palace"
  bronze_age_palace_storage_desc: "Centralized granaries and storerooms collect harvests, ration laborers and protect the city from famine and siege."

  bronze_age_palace_sacred: "Sacred Palace"
  bronze_age_palace_sacred_desc: "Royal ritual, priestly service and sacred offerings bind palace authority to the gods and the ceremonial life of the city."

  bronze_age_palace_military: "Military Palace"
  bronze_age_palace_military_desc: "A fortified palace quarter maintains guards, chariot equipment, arsenals and emergency stores for defending the royal city."

  bronze_age_palace_bureaucracy: "Palace Bureaucracy"
  bronze_age_palace_bureaucracy_desc: "A class of scribes, overseers and administrators who maintain the records and obligations of the palace economy."

  bronze_age_palace_redistribution: "Palace Redistribution"
  bronze_age_palace_redistribution_desc: "Grain, textiles, metals and labor are gathered by the palace and redistributed to workers, soldiers, temples and royal workshops."

  bronze_age_centralized_granaries: "Centralized Granaries"
  bronze_age_centralized_granaries_desc: "Large palace-controlled stores that preserve harvests, sustain dependents and soften the blow of bad seasons."

  palace_registry_maintenance_tablets: "Tablet Archives"
  palace_registry_maintenance_tablets_desc: "Military obligations, household records, and administrative accounts are preserved on clay tablets stored within the registry's archives."

  palace_registry_maintenance_leather: "Leather Records"
  palace_registry_maintenance_leather_desc: "Durable leather documents allow officials to maintain military rosters, inventories, and administrative records that can withstand frequent handling."

  palace_registry_maintenance_potsherds: "Potsherd Registers"
  palace_registry_maintenance_potsherds_desc: "Broken pottery shards provide a cheap medium for tallies, musters, receipts, and other routine administrative records."

  palace_registry_maintenance_wood: "Wooden Registers"
  palace_registry_maintenance_wood_desc: "Wooden tablets and boards provide reusable surfaces for maintaining rosters, obligations, and day-to-day administrative accounts."

  palace_registry_maintenance_paper: "Paper Archives"
  palace_registry_maintenance_paper_desc: "Lightweight paper records allow officials to maintain extensive archives and correspondence with unprecedented efficiency."


# ADDITIONS

  palace_registry: "Palace Service Registry"
  palace_registry_desc: "A central office of scribes and administrators responsible for maintaining records of households, obligations, landholdings, and military service. The registry provides the palace with the information needed to raise troops and govern its territories effectively."

  palace_trade_registry: "Palace Trade Registry"
  palace_trade_registry_desc: "Scribes attached to the palace maintain records of caravans, merchants, tribute deliveries, imported goods, and exchange agreements. These archives allow the administration to monitor and direct the flow of wealth throughout the realm."